<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SCRPR — URL &amp; PDF Extractor</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='80' font-size='80'%3E🔍%3C/text%3E%3C/svg%3E">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0a0a;
      --bg-card: #111113;
      --bg-card-hover: #1a1a1e;
      --bg-input: #18181b;
      --border: #27272a;
      --border-focus: #f97316;
      --text: #fafafa;
      --text-secondary: #a1a1aa;
      --text-muted: #71717a;
      --accent: #f97316;
      --accent-hover: #fb923c;
      --accent-glow: rgba(249, 115, 22, 0.15);
      --success: #22c55e;
      --error: #ef4444;
      --radius: 12px;
      --radius-sm: 8px;
      --mono: 'JetBrains Mono', monospace;
      --sans: 'Inter', -apple-system, sans-serif;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { background: var(--bg); color: var(--text); font-family: var(--sans); }
    body { min-height: 100vh; display: flex; flex-direction: column; }

    .header {
      border-bottom: 1px solid var(--border);
      padding: 16px 24px;
      display: flex; align-items: center; justify-content: space-between;
      position: sticky; top: 0;
      background: rgba(10, 10, 10, 0.85);
      backdrop-filter: blur(20px);
      z-index: 50;
    }
    .header-left { display: flex; align-items: center; gap: 12px; }
    .logo { font-size: 20px; font-weight: 700; letter-spacing: -0.5px; }
    .logo span { color: var(--accent); }
    .badge {
      font-size: 11px; font-weight: 600; padding: 2px 8px; border-radius: 20px;
      background: var(--accent-glow); color: var(--accent);
      border: 1px solid rgba(249, 115, 22, 0.3);
    }
    .auth-bar { display: flex; align-items: center; gap: 8px; }
    .auth-bar input {
      background: var(--bg-input); border: 1px solid var(--border);
      border-radius: var(--radius-sm); padding: 8px 12px;
      color: var(--text); font-size: 13px; font-family: var(--mono);
      width: 220px; transition: border-color 0.2s;
    }
    .auth-bar input:focus { outline: none; border-color: var(--border-focus); }
    .auth-status {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--text-muted); transition: background 0.3s;
    }
    .auth-status.ok { background: var(--success); }

    .main {
      flex: 1; display: flex; max-width: 1400px; width: 100%;
      margin: 0 auto; padding: 24px; gap: 24px;
    }
    @media (max-width: 900px) {
      .main { flex-direction: column; }
      .panel-left, .panel-right { width: 100% !important; }
    }
    .panel-left { width: 440px; flex-shrink: 0; }
    .panel-right { flex: 1; min-width: 0; display: flex; flex-direction: column; }

    .card {
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: var(--radius); overflow: hidden;
    }
    .card-header {
      padding: 16px 20px; border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
    }
    .card-title { font-size: 14px; font-weight: 600; }
    .card-body { padding: 20px; }

    .form-group { margin-bottom: 16px; }
    .form-group:last-child { margin-bottom: 0; }
    label {
      display: block; font-size: 12px; font-weight: 500;
      color: var(--text-secondary); margin-bottom: 6px;
      text-transform: uppercase; letter-spacing: 0.5px;
    }
    .url-input-wrap { display: flex; gap: 8px; }
    .url-input {
      flex: 1; background: var(--bg-input); border: 1px solid var(--border);
      border-radius: var(--radius-sm); padding: 12px 14px;
      color: var(--text); font-size: 14px; font-family: var(--sans);
      transition: border-color 0.2s;
    }
    .url-input:focus {
      outline: none; border-color: var(--border-focus);
      box-shadow: 0 0 0 3px var(--accent-glow);
    }
    .url-input::placeholder { color: var(--text-muted); }

    .btn-primary {
      background: var(--accent); color: #fff; font-weight: 600; font-size: 14px;
      padding: 12px 28px; border-radius: var(--radius-sm); border: none;
      cursor: pointer; transition: background 0.2s, transform 0.1s; white-space: nowrap;
    }
    .btn-primary:hover { background: var(--accent-hover); }
    .btn-primary:active { transform: scale(0.97); }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    .btn-secondary {
      background: var(--bg-input); color: var(--text-secondary); font-weight: 500;
      font-size: 13px; padding: 8px 16px; border-radius: var(--radius-sm);
      border: 1px solid var(--border); cursor: pointer;
      transition: background 0.2s, color 0.2s;
    }
    .btn-secondary:hover { background: var(--bg-card-hover); color: var(--text); }

    .hint {
      font-size: 12px; color: var(--text-muted); margin-top: 8px; line-height: 1.5;
    }

    .pdf-badge {
      display: inline-flex; align-items: center; gap: 4px;
      font-size: 11px; font-weight: 600; padding: 2px 8px; border-radius: 20px;
      background: rgba(239, 68, 68, 0.1); color: #ef4444;
      border: 1px solid rgba(239, 68, 68, 0.2);
    }
    .html-badge {
      display: inline-flex; align-items: center; gap: 4px;
      font-size: 11px; font-weight: 600; padding: 2px 8px; border-radius: 20px;
      background: rgba(59, 130, 246, 0.1); color: #3b82f6;
      border: 1px solid rgba(59, 130, 246, 0.2);
    }

    .result-header {
      display: flex; align-items: center; justify-content: space-between;
      flex-wrap: wrap; gap: 8px;
    }
    .result-meta {
      display: flex; gap: 16px; font-size: 12px; color: var(--text-muted);
    }
    .result-meta .val { color: var(--text-secondary); font-weight: 500; }
    .status-badge {
      display: inline-flex; align-items: center; gap: 4px;
      font-size: 12px; font-weight: 600; padding: 2px 10px; border-radius: 20px;
    }
    .status-badge.success { background: rgba(34, 197, 94, 0.1); color: var(--success); }
    .status-badge.error { background: rgba(239, 68, 68, 0.1); color: var(--error); }

    .result-content {
      background: var(--bg); border: 1px solid var(--border);
      border-radius: var(--radius-sm); padding: 16px;
      font-family: var(--mono); font-size: 12px; line-height: 1.6;
      color: var(--text-secondary);
      max-height: 70vh; overflow: auto;
      white-space: pre-wrap; word-break: break-word; margin-top: 12px;
    }
    .result-content::-webkit-scrollbar { width: 6px; }
    .result-content::-webkit-scrollbar-track { background: transparent; }
    .result-content::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    .meta-grid {
      display: grid; grid-template-columns: 120px 1fr; gap: 4px 12px;
      font-size: 12px; padding: 12px 14px; margin-bottom: 12px;
      background: var(--bg); border: 1px solid var(--border);
      border-radius: var(--radius-sm);
    }
    .meta-key { color: var(--text-muted); }
    .meta-val { color: var(--text-secondary); word-break: break-all; }

    .empty-state {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; padding: 80px 20px;
      color: var(--text-muted); text-align: center;
    }
    .empty-icon { font-size: 48px; margin-bottom: 16px; opacity: 0.3; }
    .empty-state p { font-size: 14px; max-width: 300px; line-height: 1.5; }

    .loading-bar {
      height: 2px; background: var(--border);
      position: relative; overflow: hidden; display: none;
    }
    .loading-bar.active { display: block; }
    .loading-bar::after {
      content: ''; position: absolute; left: -40%; width: 40%; height: 100%;
      background: var(--accent); animation: loading 1s ease-in-out infinite;
    }
    @keyframes loading {
      0% { left: -40%; }
      100% { left: 100%; }
    }

    .hidden { display: none !important; }

    .toast {
      position: fixed; bottom: 24px; right: 24px;
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: var(--radius-sm); padding: 12px 20px;
      font-size: 13px; color: var(--text-secondary); z-index: 100;
      animation: fadeInUp 0.3s ease; max-width: 360px;
    }
    .toast.error { border-color: var(--error); color: var(--error); }
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

  <header class="header">
    <div class="header-left">
      <div class="logo"><span>SCRPR</span></div>
      <div class="badge">BETA</div>
    </div>
    <div class="auth-bar">
      <div class="auth-status" id="authStatus" title="Not authenticated"></div>
      <input type="password" id="tokenInput" placeholder="Admin token" autocomplete="off">
    </div>
  </header>

  <div class="main">
    <div class="panel-left">
      <div class="card">
        <div class="card-header">
          <div class="card-title">Extract Content</div>
        </div>
        <div class="card-body">
          <div class="form-group">
            <label>URL</label>
            <div class="url-input-wrap">
              <input type="url" class="url-input" id="scrapeUrl" placeholder="https://example.com/report.pdf">
              <button class="btn-primary" id="scrapeBtn">Extract</button>
            </div>
            <p class="hint">Paste any URL — PDFs are automatically detected and text-extracted. HTML pages return markdown.</p>
          </div>
        </div>
      </div>
    </div>

    <div class="panel-right">
      <div class="card" style="flex:1;display:flex;flex-direction:column;">
        <div class="card-header">
          <div class="card-title">Results</div>
        </div>
        <div class="loading-bar" id="loadingBar"></div>
        <div class="card-body" style="flex:1;overflow:auto;" id="resultBody">
          <div class="empty-state" id="emptyState">
            <div class="empty-icon">&#9678;</div>
            <p>Paste a URL and hit Extract to pull content from any webpage or PDF.</p>
          </div>
          <div class="hidden" id="scrapeResult"></div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const $ = (s) => document.querySelector(s);

    function getToken() { return $('#tokenInput').value.trim(); }

    // Persist token
    const saved = sessionStorage.getItem('scraper_token');
    if (saved) {
      $('#tokenInput').value = saved;
      $('#authStatus').classList.add('ok');
      $('#authStatus').title = 'Token set';
    }
    $('#tokenInput').addEventListener('input', () => {
      const t = getToken();
      sessionStorage.setItem('scraper_token', t);
      $('#authStatus').classList.toggle('ok', t.length > 0);
      $('#authStatus').title = t ? 'Token set' : 'Not authenticated';
    });

    // Extract button
    $('#scrapeBtn').addEventListener('click', async () => {
      const url = $('#scrapeUrl').value.trim();
      if (!url) { showToast('Enter a URL', true); return; }

      const token = getToken();
      if (!token) { showToast('Enter your admin token first', true); return; }

      showLoading(true);
      $('#emptyState').classList.add('hidden');
      $('#scrapeResult').classList.add('hidden');

      try {
        const resp = await fetch('/api/scrape?action=scrape', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'X-Admin-Token': token },
          body: JSON.stringify({ url, format: 'markdown', include_metadata: true, stealth: true }),
        });
        const data = await resp.json();
        if (!resp.ok) throw new Error(data.error || `HTTP ${resp.status}`);
        if (data.success) renderResult(data.data);
      } catch (e) {
        showToast(e.message, true);
      } finally {
        showLoading(false);
      }
    });

    // Keyboard shortcut: Ctrl/Cmd + Enter
    document.addEventListener('keydown', (e) => {
      if ((e.metaKey || e.ctrlKey) && e.key === 'Enter') {
        const btn = $('#scrapeBtn');
        if (btn && !btn.disabled) btn.click();
      }
    });

    // Also trigger on Enter in URL field
    $('#scrapeUrl').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        e.preventDefault();
        const btn = $('#scrapeBtn');
        if (btn && !btn.disabled) btn.click();
      }
    });

    function renderResult(d) {
      const el = $('#scrapeResult');
      el.classList.remove('hidden');

      const isPdf = d.format === 'pdf';
      const statusClass = d.status >= 200 && d.status < 400 ? 'success' : 'error';
      const typeBadge = isPdf
        ? `<span class="pdf-badge">PDF · ${d.page_count || '?'} pages</span>`
        : `<span class="html-badge">HTML</span>`;

      let metaHtml = '';
      if (d.metadata) {
        const entries = Object.entries(d.metadata).filter(([k, v]) => v && k !== 'url');
        if (entries.length) {
          metaHtml = `<div class="meta-grid">${entries.map(([k, v]) =>
            `<span class="meta-key">${esc(k)}</span><span class="meta-val">${esc(String(v))}</span>`
          ).join('')}</div>`;
        }
      }

      el.innerHTML = `
        <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;margin-bottom:12px;">
          <div style="display:flex;align-items:center;gap:8px;">
            <span class="status-badge ${statusClass}">${d.status}</span>
            ${typeBadge}
            <span style="font-size:13px;font-weight:500;">${esc(d.title || 'Untitled')}</span>
          </div>
          <div class="result-meta">
            <span>${(d.word_count || 0).toLocaleString()} <span class="val">words</span></span>
            <span>${d.elapsed_ms} <span class="val">ms</span></span>
            <button class="btn-secondary" onclick="copyResult()">Copy</button>
          </div>
        </div>
        ${metaHtml}
        <div class="result-content" id="resultText">${esc(d.content)}</div>
      `;
    }

    function esc(s) {
      const d = document.createElement('div');
      d.textContent = s;
      return d.innerHTML;
    }

    function showLoading(on) {
      $('#loadingBar').classList.toggle('active', on);
      $('#scrapeBtn').disabled = on;
      if (on) $('#scrapeBtn').textContent = 'Extracting…';
      else $('#scrapeBtn').textContent = 'Extract';
    }

    function copyResult() {
      const el = document.getElementById('resultText');
      if (el) navigator.clipboard.writeText(el.textContent).then(() => showToast('Copied to clipboard'));
    }

    let toastTimer;
    function showToast(msg, isError) {
      const existing = document.querySelector('.toast');
      if (existing) existing.remove();
      const t = document.createElement('div');
      t.className = 'toast' + (isError ? ' error' : '');
      t.textContent = msg;
      document.body.appendChild(t);
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => t.remove(), 3000);
    }
  </script>
</body>
</html>
