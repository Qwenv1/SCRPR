[build]
  publish = "public"
  functions = "netlify/functions"
  command = "# no build step"

[build.environment]
  NODE_VERSION = "22"

[functions]
  node_bundler = "esbuild"

[functions."scrape"]
  timeout = 60

# Fallback redirect in case Functions v2 config.path routing is not picked up
[[redirects]]
  from = "/api/scrape"
  to = "/.netlify/functions/scrape"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

